<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Using CSS Positions</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      height: 3000px;
    }

    #button {
      height: 50px;
      width: 50px;
      border-radius: 25px;
      background-color: gray;
      color: red;
      font-size: large;
      margin-left: 1275px;
      position: absolute;
    }

    #box {
      width: 320px;
      height: 180px;
      border: none;
      background-color: red;
      position: fixed;
      margin-left: 1000px;
      margin-top: 420px;
    }

    img {
      position: relative;
      height: 270px;
      width: 200px;
    }

    .off {
      position: absolute;
      top: 15px;
      left: 135px;
      display: inline-block;
      border: none;
      background-color: blue;
      color: black;
      height: 20px;
      width: 70px;
      font-size: 11px;
      text-align: center;
    }

    .atc-container {
      position: absolute;
      top: 150px;
      left: 0px;
      background-color: lime;
      height: 85px;
      width: 200px;
    }

    .atc {
      position: relative;
      top: 30px;
      left: 55px;
      border: 1px solid red;
      background-color: yellow;
      height: 25px;
      width: 80px;
      font-size: 10px;
      cursor: pointer;
    }

    .atc:hover {
      color: pink;
    }
  </style>
</head>

<body>

  <div>
    <button id="button">X</button>
  </div>

  <div id="box"></div>

  <div id="main-container">
    <div class="cloth">
      <img src="p.jpg">
      <div class="off">15% OFF</div>

      <div class="atc-container">
        <button class="atc">Add to Cart</button>
      </div>
    </div>
  </div>

</body>
</html>
